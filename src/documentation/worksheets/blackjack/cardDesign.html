<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="en-GB">

<head>
   <style>
body {
    background-color: darkgreen;
}
.card {
    position: relative;
    float: left;
    background-color: white;
    width: 95px;
    height:140px;
    margin-top:20px;
    margin-left:20px;
    padding: 5px;
    border-radius: 5px;
    font-family: Helvetica, sans-serif; 
}
.a,.b,.c,.d,.e,.f,.g,.h,.i,.j,.k,.l,.m,.n,.o,.p,.q,.r,.s,.t,.u,.v,.w,.x,.y,.z {position: absolute; text-align:center;}

/* Standard spots */ 
    .a,.b,.c,.d,.e,.f,.g,.h,.i,.l,.m,.n,.o,.p,.r,.s,.t  {font-size:  30px;}

    /* columns */
    .d,.n,.h,.p,.f {left: 18px }
    .a,.b,.c,.l,.m,.s,.t {left: 43px;}
    .e,.o,.i,.r,.g {left: 68px}

    /* rows */
    .d,.b,.e {top: 0px}
    .s {top: 20px;}
    .l {top: 28px;}
    .n,.o {top: 37px;}
    .h,.a,.i {top: 57px}
    .p,.r {top: 75px;  transform: rotate(180deg);}
    .m {top: 86px;  transform: rotate(180deg);}
    .t {top: 93px;  transform: rotate(180deg);}
    .f,.c,.g {top: 114px;  transform: rotate(180deg);}

/* royal pictures */
    .j,.q,.k {
        top: 20px;
        left: 20px;
        height: 105px;
        width: 68px;
    }
/* corner summary */
    .u,.x {font-size: 15px; width: 15px; text-align: center;}
    .v,.w {font-size: 20px; width: 15px; text-align: center;}
    .u,.v {left: 0px;}
    .w,.x {left: 89px; transform: rotate(180deg);}
    .u {top: 2px;}   
    .v {top: 12px;} 
    .w {top: 116px;} 
    .x {top: 132px;} 

/* suit colors */
    .red {color: red}
    .black {color: black}
   </style>
</head>

<body>
   <div class="card">
    <div class="a">a</div>
    <div class="b">b</div>
    <div class="c">c</div>
    <div class="d">d</div>
    <div class="e">e</div>
    <div class="f">f</div>
    <div class="g">g</div>
    <div class="h">h</div>
    <div class="i">i</div>
    <div class="l">l</div>
    <div class="m">m</div>
    <div class="n">n</div>
    <div class="o">o</div>
    <div class="p">p</div>
    <div class="r">r</div>
    <div class="s">s</div>
    <div class="t">t</div>

    <div class="j"></div>

    <div class="u">A</div>
    <div class="v">&clubs;</div>
    <div class="w">&clubs;</div>
    <div class="x">10</div>

   </div>


</body>
</html>
